{% extends "base.html" %}
{% block title %}数据分析 - IA Analyzer{% endblock %}
{% block page_title %}数据分析{% endblock %}

{% block content %}
<div class="row g-4">
    <div class="col-lg-3">
        <div class="chart-container" style="min-height:auto">
            <h6 class="mb-3">分析工具</h6>
            <div class="d-grid gap-2">
                <button class="btn btn-outline-secondary btn-sm text-start">描述统计</button>
                <button class="btn btn-outline-secondary btn-sm text-start">排行榜</button>
                <button class="btn btn-outline-secondary btn-sm text-start">相关性分析</button>
                <button class="btn btn-outline-secondary btn-sm text-start">趋势对比</button>
                <hr>
                <label class="form-label" style="font-size:0.82rem">图表类型</label>
                <select class="form-select form-select-sm">
                    <option>折线图 - 时间趋势</option>
                    <option>柱状图 - 排行榜</option>
                    <option>饼图 - 分布</option>
                    <option>散点图</option>
                    <option>热力图</option>
                </select>
            </div>
        </div>
    </div>
    <div class="col-lg-9">
        <div class="chart-container">
            <div style="text-align:center;padding-top:140px;color:#a0a8b8">
                <i class="bi bi-bar-chart-line" style="font-size:3rem"></i>
                <p class="mt-3">选择分析工具以生成图表</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
