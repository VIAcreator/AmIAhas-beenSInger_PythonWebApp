<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Am I A has-been Singer?{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 220px;
            --topbar-height: 56px;
            --primary: #5470c6;
            --primary-light: #e8edf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }

        /* ===== 侧栏 ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: #1a1d29;
            color: #b0b8c8;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 22px 20px 18px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-brand span {
            color: var(--primary);
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            color: #8b92a8;
            text-decoration: none;
            font-size: 0.92rem;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover {
            color: #d0d5e0;
            background: rgba(255,255,255,0.04);
        }

        .sidebar-nav a.active {
            color: #fff;
            background: rgba(84,112,198,0.18);
            border-left-color: var(--primary);
        }

        .sidebar-nav a i {
            font-size: 1.1rem;
            width: 22px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 0.78rem;
            color: #5a6070;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.loaded { background: #52c41a; }
        .status-dot.empty  { background: #8c8c8c; }

        /* ===== 主区域 ===== */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
        }

        .topbar {
            height: var(--topbar-height);
            background: #fff;
            border-bottom: 1px solid #e8ecf1;
            display: flex;
            align-items: center;
            padding: 0 28px;
            font-size: 0.88rem;
            color: #5e6278;
            gap: 16px;
        }

        .topbar .page-title {
            font-weight: 600;
            color: #181c32;
            font-size: 1.05rem;
        }

        .content {
            padding: 24px 28px;
        }

        /* ===== 概览卡片 ===== */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            border-radius: 8px;
            padding: 18px 20px;
            border: 1px solid #eef0f4;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #8c93a8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #181c32;
        }

        .stat-card .sub {
            font-size: 0.78rem;
            color: #b0b8c8;
            margin-top: 2px;
        }

        /* ===== 上传区 ===== */
        .upload-zone {
            border: 2px dashed #d0d5e0;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .upload-zone i {
            font-size: 2.5rem;
            color: #b0b8c8;
            margin-bottom: 10px;
        }
        .upload-zone .hint {
            font-size: 0.82rem;
            color: #a0a8b8;
            margin-top: 6px;
        }

        /* ===== 数据表格 ===== */
        .table-preview {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #eef0f4;
            overflow: hidden;
        }

        .table-preview .table {
            margin: 0;
            font-size: 0.84rem;
        }

        .table-preview .table thead {
            background: #fafbfc;
            position: sticky;
            top: 0;
        }

        .table-preview .table-wrapper {
            max-height: 420px;
            overflow: auto;
        }

        /* ===== 图表容器 ===== */
        .chart-container {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #eef0f4;
            padding: 20px;
            min-height: 400px;
        }

        /* ===== 对话区 ===== */
        .chat-messages {
            max-height: 55vh;
            overflow-y: auto;
            padding: 12px 0;
        }

        .chat-bubble {
            max-width: 80%;
            margin-bottom: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .chat-bubble.user {
            background: var(--primary);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 3px;
        }

        .chat-bubble.assistant {
            background: #f0f1f5;
            color: #181c32;
            border-bottom-left-radius: 3px;
        }

        .chat-bubble .chart-inline {
            margin-top: 10px;
            min-height: 280px;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>

<!-- ===== 侧栏 ===== -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <span>IA</span> Analyzer
    </div>

    <nav class="sidebar-nav">
        <a href="/"        class="{% if request.path == '/' %}active{% endif %}">
            <i class="bi bi-folder2-open"></i> 数据加载
        </a>
        <a href="/analysis" class="{% if request.path == '/analysis' %}active{% endif %}">
            <i class="bi bi-bar-chart-line"></i> 数据分析
        </a>
        <a href="/chat"     class="{% if request.path == '/chat' %}active{% endif %}">
            <i class="bi bi-robot"></i> AI 问答
        </a>
    </nav>

    <div class="sidebar-footer">
        <span class="status-dot empty" id="status-dot"></span>
        <span id="status-text">未加载数据</span>
    </div>
</aside>

<!-- ===== 主区域 ===== -->
<div class="main-wrapper">
    <!-- 顶栏 -->
    <div class="topbar">
        <span class="page-title">{% block page_title %}{% endblock %}</span>
        <span style="flex:1"></span>
        <span id="topbar-stat" style="font-size:0.82rem;color:#a0a8b8"></span>
    </div>

    <!-- 概览卡片（默认隐藏，加载数据后 JS 填充） -->
    <div class="content">
        <div class="stat-cards" id="stat-cards" style="display:none">
            <div class="stat-card">
                <div class="label">总记录数</div>
                <div class="value" id="stat-rows">-</div>
            </div>
            <div class="stat-card">
                <div class="label">字段数</div>
                <div class="value" id="stat-cols">-</div>
            </div>
            <div class="stat-card">
                <div class="label">时间范围</div>
                <div class="value" id="stat-daterange" style="font-size:1.05rem">-</div>
            </div>
            <div class="stat-card">
                <div class="label">歌曲数</div>
                <div class="value" id="stat-songs">-</div>
            </div>
        </div>

        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
{% block scripts_extra %}{% endblock %}
</body>
</html>
